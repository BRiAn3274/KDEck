[tool.ruff]
target-version = "py311"
line-length = 160

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "B",   # flake8-bugbear
    "I",   # isort
]
ignore = [
    "E501",  # line too long (handled by line-length)
    "B904",  # raise without from exc
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
